# Dependabot auto-updates — asepharyana-hub-hub
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # ── npm dependencies (Next.js, shadcn, Tailwind, etc.) ──
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 10
    assignees:
      - "asepharyana"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    versioning-strategy: "increase"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
        update-types:
          - "minor"
          - "patch"
      nextjs:
        patterns:
          - "next*"
          - "@next/*"
        update-types:
          - "minor"
          - "patch"
      tailwind:
        patterns:
          - "tailwindcss*"
          - "@tailwindcss/*"
        update-types:
          - "minor"
          - "patch"
      shadcn:
        patterns:
          - "shadcn*"
          - "@shadcn/*"
        update-types:
          - "minor"
          - "patch"
      typescript-eslint:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
          - "@types/node*"
        update-types:
          - "minor"
          - "patch"
      biome:
        patterns:
          - "@biomejs/*"
        update-types:
          - "minor"
          - "patch"
      framer-motion:
        patterns:
          - "framer-motion*"
        update-types:
          - "minor"
          - "patch"